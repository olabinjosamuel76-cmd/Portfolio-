<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Portfolio Agency</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
  }

  .container {
    padding: 60px 20px;
    text-align: center;
  }

  h1 {
    font-size: 48px;
    margin-bottom: 10px;
  }

  p {
    color: #aaa;
    max-width: 600px;
    margin: auto;
  }

  button {
    margin: 10px;
    padding: 12px 20px;
    border: none;
    cursor: pointer;
    border-radius: 8px;
  }

  .primary {
    background: white;
    color: black;
  }

  .outline {
    background: transparent;
    color: white;
    border: 1px solid white;
  }

  .grid {
    display: none;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-top: 40px;
  }

  .card {
    background: #111;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #222;
  }

  footer {
    margin-top: 60px;
    color: #666;
  }
</style>
</head>

<body>

<div class="container">
  <h1>AI Portfolio Agency</h1>
  <p>I build automated systems, AI tools, and digital products that scale.</p>

  <div>
    <button class="primary" onclick="toggle()">View Projects</button>
    <button class="outline">Contact Me</button>
  </div>

  <div class="grid" id="grid">
    <div class="card">
      <h3>AI Landing Page</h3>
      <p>High-converting AI agency website.</p>
    </div>

    <div class="card">
      <h3>Telegram Bot</h3>
      <p>Automation system for onboarding users.</p>
    </div>

    <div class="card">
      <h3>Video Generator</h3>
      <p>Turns scripts into viral videos.</p>
    </div>
  </div>

  <footer>© 2026 AI Portfolio Agency</footer>
</div>

<script>
function toggle() {
  const grid = document.getElementById("grid");
  grid.style.display = grid.style.display === "grid" ? "none" : "grid";
}
</script>

</body>
</html>
